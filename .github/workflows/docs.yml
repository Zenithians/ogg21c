name: Documentation
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Zensical
        run: pip install zensical

      - uses: actions/configure-pages@v5

      - name: Build documentation
        run: zensical build --clean

      - name: Ensure all image assets are included
        run: |
          mkdir -p site/assets/images
          cp -a docs/assets/images/. site/assets/images/

      - name: Verify image asset count
        run: |
          docs_count=$(find docs/assets/images -type f | wc -l)
          site_count=$(find site/assets/images -type f | wc -l)
          echo "docs/assets/images files: ${docs_count}"
          echo "site/assets/images files: ${site_count}"
          if [ "$site_count" -lt "$docs_count" ]; then
            echo "ERROR: Some images are missing in site/assets/images"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
